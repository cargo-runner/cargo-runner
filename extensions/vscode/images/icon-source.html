<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: transparent;
  }
  .icon {
    width: 512px;
    height: 512px;
    border-radius: 96px;
    background:
      radial-gradient(circle at 28% 22%, rgba(255, 180, 90, 0.35), transparent 42%),
      radial-gradient(circle at 78% 78%, rgba(56, 189, 248, 0.12), transparent 40%),
      linear-gradient(145deg, #1a222c 0%, #0b0f14 55%, #111827 100%);
    box-shadow:
      inset 0 0 0 6px rgba(249, 115, 22, 0.35),
      inset 0 2px 0 rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* subtle grid */
  .icon::before {
    content: "";
    position: absolute;
    inset: 48px;
    border-radius: 72px;
    background-image:
      linear-gradient(rgba(148,163,184,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at center, black 40%, transparent 75%);
  }
  .play-ring {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: linear-gradient(145deg, #fb923c 0%, #ea580c 55%, #c2410c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 18px 40px rgba(234, 88, 12, 0.45),
      0 0 0 10px rgba(249, 115, 22, 0.15);
    position: relative;
    z-index: 1;
  }
  .play {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 52px 0 52px 88px;
    border-color: transparent transparent transparent #0b0f14;
    margin-left: 18px;
    filter: drop-shadow(0 2px 0 rgba(255,255,255,0.08));
  }
  /* tiny rust gear accent */
  .badge {
    position: absolute;
    right: 88px;
    bottom: 96px;
    width: 88px;
    height: 88px;
    border-radius: 22px;
    background: linear-gradient(145deg, #38bdf8, #0284c7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-weight: 800;
    font-size: 36px;
    color: #0b0f14;
    letter-spacing: -0.04em;
    box-shadow: 0 8px 20px rgba(2, 132, 199, 0.4);
    z-index: 2;
    border: 4px solid #0b0f14;
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="play-ring"><div class="play"></div></div>
    <div class="badge">R</div>
  </div>
</body>
</html>
