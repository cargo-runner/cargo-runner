name: CI (Bazel)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # Set this secret in your repo: Settings → Secrets → BUILDBUDDY_API_KEY
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

jobs:
  # ── Bazel build + test on Linux & macOS ───────────────────────────────────
  bazel:
    name: Bazel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    # Pin exact Bazel version from .bazelversion
    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.9.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    # Warm the crate_universe index (the slow first-run step)
    - name: Sync crate universe
      run: bazel fetch //...

    - name: Build all targets
      run: |
        EXTRA_FLAGS=""
        if [ -n "$BUILDBUDDY_API_KEY" ]; then
          EXTRA_FLAGS="--config=ci --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}"
        fi
        bazel build $EXTRA_FLAGS //...
      shell: bash

    - name: Run all tests
      run: |
        EXTRA_FLAGS=""
        if [ -n "$BUILDBUDDY_API_KEY" ]; then
          EXTRA_FLAGS="--config=ci --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}"
        fi
        bazel test $EXTRA_FLAGS //...
      shell: bash

