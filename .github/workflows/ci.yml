name: CI (Cargo)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CACHE_ON_FAILURE: false

jobs:
  # Clippy runs on all platforms (Bazel doesn't run clippy)
  clippy:
    name: Clippy on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: "."
    - name: Run Clippy
      run: cargo clippy --all-targets -- -D warnings
      shell: bash

  # Full test suite on Windows (Bazel CI only covers Linux/macOS)
  windows-tests:
    name: Tests on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: "."
    - name: Run tests
      run: cargo test --all-targets
      shell: bash
