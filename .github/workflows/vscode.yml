name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - "extensions/vscode/**"
      - ".github/workflows/vscode.yml"
  pull_request:
    paths:
      - "extensions/vscode/**"
      - ".github/workflows/vscode.yml"

# Publishing lives in release.yml (job: publish-extension). A `release:` trigger
# would never fire here: release.yml creates the release with GITHUB_TOKEN, and
# GITHUB_TOKEN-triggered events cannot start new workflow runs.

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & bundle
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: cargo-runner-vscode
          path: extensions/vscode/*.vsix
