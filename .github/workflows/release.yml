name: Release

on:
  push:
    tags:
      - 'cargo-runner-cli-v*' # Trigger on tags like cargo-runner-cli-v0.1.0

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: cargo-runner-cli

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use-cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "."

    # Install cross if building for a different architecture on linux
    - name: Install cross
      if: matrix.use-cross
      uses: taiki-e/install-action@cross

    - name: Build Binary
      shell: bash
      run: |
        if [ "${{ matrix.use-cross }}" == "true" ]; then
          cross build --release --target ${{ matrix.target }} -p cargo-runner-cli
        else
          cargo build --release --target ${{ matrix.target }} -p cargo-runner-cli
        fi
      working-directory: .

    - name: Package Release
      shell: bash
      run: |
        VERSION=${GITHUB_REF_NAME#cargo-runner-cli-v}
        ARCHIVE_NAME="${CRATE_NAME}-${{ matrix.target }}-v${VERSION}"
        mkdir -p "${ARCHIVE_NAME}"
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cp target/${{ matrix.target }}/release/cargo-runner.exe "${ARCHIVE_NAME}/"
        else
          cp target/${{ matrix.target }}/release/cargo-runner "${ARCHIVE_NAME}/"
        fi
        cp README.md LICENSE "${ARCHIVE_NAME}/"
        tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
        echo "ASSET_NAME=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.target }}
        path: ${{ env.ASSET_NAME }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true

  publish-extension:
    name: Publish VS Code Extension
    needs: create-release   # CLI binaries must be on the release before the extension goes live
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: extensions/vscode/package-lock.json

    - name: Verify extension version matches tag
      run: |
        TAG_VERSION=${GITHUB_REF_NAME#cargo-runner-cli-v}
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "::error::tag is $TAG_VERSION but package.json is $PKG_VERSION — the extension downloads cargo-runner-cli-v\$version, so these must match"
          exit 1
        fi

    - name: Install dependencies
      run: npm ci

    - name: Build & package
      run: |
        npm run build
        npx vsce package --no-dependencies

    # A CLI-only release (see docs/release.md) re-runs this job without an
    # extension version bump. Check each registry first so those releases skip
    # cleanly instead of failing on a duplicate-version upload.
    - name: Check which registries already have this version
      id: pub
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

        if npx vsce show masterustacean.cargo-runner --json > /tmp/vsce.json 2>/dev/null; then
          HAS=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/vsce.json','utf8')).versions.some(v => v.version === '$VERSION')")
        else
          HAS=false   # extension not on the Marketplace at all yet
        fi
        echo "vsce_has=$HAS" >> "$GITHUB_OUTPUT"

        CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
          "https://open-vsx.org/api/masterustacean/cargo-runner/$VERSION" || echo 000)
        [ "$CODE" = "200" ] && echo "ovsx_has=true" >> "$GITHUB_OUTPUT" || echo "ovsx_has=false" >> "$GITHUB_OUTPUT"

        echo "::notice::$VERSION — marketplace=$HAS openvsx=$([ "$CODE" = 200 ] && echo true || echo false)"

    - name: Publish to VS Code Marketplace
      if: steps.pub.outputs.vsce_has == 'false'
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: npx vsce publish --packagePath *.vsix

    - name: Publish to Open VSX
      if: steps.pub.outputs.ovsx_has == 'false'
      env:
        OVSX_PAT: ${{ secrets.OVSX_PAT }}
      run: |
        npx --yes ovsx create-namespace masterustacean || true

        set +e
        out=$(npx --yes ovsx publish ./*.vsix 2>&1)
        rc=$?
        set -e
        echo "$out"

        # An upload can succeed and then sit inactive for several minutes while
        # Open VSX scans it. The public API 404s for the whole of that window, so
        # the pre-check above reports "not published" and a re-run lands here on a
        # version that did upload. Treat that as success rather than failing the job.
        if [ $rc -ne 0 ]; then
          echo "$out" | grep -q "isn't active" || exit $rc
          echo "::warning::${{ steps.pub.outputs.version }} uploaded to Open VSX but not yet active — still processing, no action needed"
        fi

    - name: Attach VSIX to release
      uses: softprops/action-gh-release@v2
      with:
        files: extensions/vscode/*.vsix
